<!-- Contenido principal -->
<main class="container mt-5 pt-5">

  <section class="text-center mb-5">
    <h1 class="fw-bold">Contáctanos</h1>
    <p class="text-muted">
      En Pets Market estamos felices de ayudarte con cualquier duda o consulta.
    </p>
  </section>


  <section class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">

          <form action="recibir.php" method="post">



            <div class="mb-3">
              <label for="Name" class="form-label fw-semibold">
                Nombre
              </label>

              <input
                type="text"
                class="form-control"
                id="Name"
                name="Name"
                placeholder="Ingresa tu nombre"
                required
              >
            </div>


            <div class="mb-3">
              <label for="email" class="form-label fw-semibold">
                Email
              </label>

              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                placeholder="ejemplo@correo.com"
                required
              >
            </div>


            <div class="mb-4">
              <label for="mensaje" class="form-label fw-semibold">
                Mensaje
              </label>

              <textarea
                class="form-control"
                id="mensaje"
                name="mensaje"
                rows="6"
                placeholder="Escribe aquí tu mensaje..."
                required
              ></textarea>
            </div>


            <div class="d-grid">
              <input
                type="submit"
                value="Enviar"
                class="btn btn-dark btn-lg"
              >
            </div>

          </form>

        </div>
      </div>

    </div>
  </section>

</main>
