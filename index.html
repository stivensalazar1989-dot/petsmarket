<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pets Market</title>
  <link rel="stylesheet" href="style.css">


  <style>
      /* Reset básico para consistencia */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', Tahoma, sans-serif; line-height: 1.6; color: #333; padding: 20px; }


      h1 {
          text-decoration-line: underline;
          background-color: lightgreen;
          text-align: center;
          margin-bottom: 20px;
          padding: 40px 20px;
          text-shadow: 2px 2px 5px #171616;
          -webkit-text-stroke: 1px white;
      }

      h1, h2 { text-align: center; margin-bottom: 20px; }


      /* Estilo de navegación */
      nav { background: lightgrey; padding: 1rem; border-radius: 8px; margin-bottom: 20px; }
      nav ul { display: flex; justify-content: center; list-style: none; gap: 20px; }
      nav a { text-decoration: none; color: lightgreen; font-weight: bold; padding: 5px 10px; -webkit-text-stroke: 1px #171616; font-size: x-large }
      nav a:hover { background: white; color: lightgreen; border-radius: 4px; }
      nav ul li {color: lightgreen; font-weight: bold; -webkit-text-stroke: 1px black; font-size: x-large  }

      .card {
          border: 1px solid #ddd;
          border-radius: 10px;
          width: 300px;
          overflow: hidden;
          margin: 20px auto;
          box-shadow: 0 4px 8px rgba(0,0,0,0.1);
          transition: all 0.3s ease;
          cursor: pointer;
      }

      .card:hover {
          transform: translateY(-10px);
          box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      }

      .card-container {
          padding: 15px;
          text-align: center;
          background: #fff;
      }

      /* Contenedor multimedia */
      .media-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 30px; }
      img, video { border-radius: 10px; object-fit: cover; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

      /* Tarjetas */
      .card { border: 1px solid #ddd; border-radius: 10px; width: 300px; overflow: hidden; margin: 0 auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
      .card img { width: 100%; height: auto; display: block; }
      .card-container { padding: 15px; text-align: center; background: #fff; }
  </style>

</head>
<style>
    body {
        background-color: bisque;
    }

</style>
<body>


<h1 style="background-color:lightgreen;">🐶 Pets Market 🐶 </h1>



<nav>
  <ul>
    <li>Alimentos</li>
    <li>Snacks</li>
    <li>Accesorios</li>
    <li>Medicamentos</li>
  </ul>
</nav>

<nav style="text-align: center; margin-bottom: 20px;">
  <a href="assets/page/quienessomos.html">Quienes somos</a>
  <a href="assets/page/promociones.html">Promociones</a>
  <a href="assets/page/productos.html">Productos</a>
  <a href="assets/page/creatuperfil.html">Creatuperfil</a>
</nav>

<div class="media-container">
  <img src="assets/img/alimento.jpg" alt="alimento" width="200" height="200">
  <img src="assets/img/accesorios.jpg" alt="accesorios" width="200" height="200">
  <video src="assets/video/perro.mp4" controls width="200" height="200"></video>
  <img src="assets/img/snacks.jpg" alt="snacks" width="200" height="200">
</div>

<hr>


<h2>Tarjetas</h2>
<div class="card">
  <img src="assets/img/gela.jpg" alt="Pets Market - CG Gela">
  <div class="card-container">
    <p>Pets Market / CG Gela</p>
  </div>
</div>


</body>
</html>
